repos:
  # ============================================
  # Python Code Formatting
  # ============================================
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        args: [--line-length=100]

  # ============================================
  # Import Sorting
  # ============================================
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: [--profile=black, --line-length=100]

  # ============================================
  # Linting
  # ============================================
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=127, --extend-ignore=E203,W503]
        additional_dependencies: [
          flake8-docstrings,
          flake8-bugbear,
          flake8-comprehensions,
          flake8-simplify
        ]

  # ============================================
  # Type Checking
  # ============================================
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional]
        additional_dependencies: [types-requests, types-beautifulsoup4]
        files: ^seo_auditor/

  # ============================================
  # Security
  # ============================================
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.6
    hooks:
      - id: bandit
        args: [-r, seo_auditor/, -f, screen]
        exclude: ^tests/

  # ============================================
  # General Checks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent giant files from being committed
      - id: check-added-large-files
        args: [--maxkb=500]
      
      # Check for files that would conflict
      - id: check-case-conflict
      
      # Check for merge conflicts
      - id: check-merge-conflict
      
      # Check YAML syntax
      - id: check-yaml
        args: [--safe]
      
      # Check JSON syntax
      - id: check-json
      
      # Check TOML syntax
      - id: check-toml
      
      # Check for debugger imports
      - id: debug-statements
      
      # Fix end of files
      - id: end-of-file-fixer
      
      # Fix trailing whitespace
      - id: trailing-whitespace
      
      # Mixed line endings
      - id: mixed-line-ending
        args: [--fix=lf]
      
      # Check Python syntax
      - id: check-ast
      
      # Check for docstring first
      - id: check-docstring-first
      
      # Detect private keys
      - id: detect-private-key

  # ============================================
  # Markdown
  # ============================================
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
          - mdformat-black
        args: [--wrap=80]

  # ============================================
  # Requirements.txt
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: requirements-txt-fixer
        files: requirements.*\.txt$

# ============================================
# Configuration
# ============================================
default_language_version:
  python: python3.11

# Files to exclude from all hooks
exclude: |
  (?x)^(
      __pycache__/|
      \.git/|
      \.venv/|
      venv/|
      env/|
      build/|
      dist/|
      .*\.egg-info/|
      \.pytest_cache/|
      \.mypy_cache/|
      htmlcov/
  )

# ============================================
# CI Configuration
# ============================================
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks
    
    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
