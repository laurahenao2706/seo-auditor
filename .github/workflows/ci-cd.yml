name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # Permite ejecución manual desde GitHub UI

jobs:
  # ============================================
  # JOB 1: Linting y Formateo
  # ============================================
  lint:
    name: 🔍 Linting y Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Instalar dependencias de linting
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: 🎨 Verificar formateo con Black
      run: |
        black --check --diff .
      continue-on-error: true
    
    - name: 📋 Verificar imports con isort
      run: |
        isort --check-only --diff .
      continue-on-error: true
    
    - name: 🔎 Análisis con Flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: 🔬 Type checking con MyPy
      run: |
        mypy seo_auditor/ --ignore-missing-imports
      continue-on-error: true

  # ============================================
  # JOB 2: Tests en Múltiples Versiones Python
  # ============================================
  test:
    name: 🧪 Tests Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    needs: lint  # Ejecuta después de lint
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage pytest pytest-cov
    
    - name: 🧪 Ejecutar tests con coverage
      run: |
        python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
        python -m coverage report -m
        python -m coverage xml
    
    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-py${{ matrix.python-version }}
        fail_ci_if_error: false
      continue-on-error: true

  # ============================================
  # JOB 3: Security Scan
  # ============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit
    
    - name: 🛡️ Verificar vulnerabilidades en dependencias
      run: |
        safety check --json
      continue-on-error: true
    
    - name: 🔐 Análisis de seguridad con Bandit
      run: |
        bandit -r seo_auditor/ -f json -o bandit-report.json
      continue-on-error: true
    
    - name: 📤 Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json

  # ============================================
  # JOB 4: Build y Test App Streamlit
  # ============================================
  build-streamlit:
    name: 🎨 Build Streamlit App
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🐍 Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: ✅ Verificar sintaxis app.py
      run: |
        python -m py_compile app.py seo_checker.py
    
    - name: 🧪 Test básico de imports
      run: |
        python -c "from seo_auditor import SeoAuditService; print('✓ Imports OK')"
    
    - name: 📝 Generar reporte de dependencias
      run: |
        pip list --format=freeze > installed-packages.txt
    
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          installed-packages.txt

  # ============================================
  # JOB 5: Deploy a Streamlit Cloud (Solo main)
  # ============================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build-streamlit, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
    
    - name: 🚀 Deploy a Streamlit Cloud
      run: |
        echo "🎯 Deployment trigger for Streamlit Cloud"
        echo "Streamlit Cloud detectará automáticamente el push a main"
        # Streamlit Cloud se sincroniza automáticamente con GitHub
        # No requiere pasos adicionales
    
    - name: 📢 Notificación de Deploy
      run: |
        echo "✅ Deploy completado exitosamente"
        echo "🌐 La app estará disponible en: https://share.streamlit.io/[tu-usuario]/[repo]/main/app.py"

  # ============================================
  # JOB 6: Release Automation (Tags)
  # ============================================
  release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    needs: [test, build-streamlit, security]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: 📥 Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 📝 Generar Release Notes
      id: release_notes
      run: |
        echo "## 🎉 Release ${{ github.ref_name }}" > release_notes.md
        echo "" >> release_notes.md
        echo "### 📋 Cambios" >> release_notes.md
        git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> release_notes.md
    
    - name: 🎁 Crear GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================
  # JOB 7: Notificaciones (Opcional)
  # ============================================
  notify:
    name: 📬 Notificaciones
    runs-on: ubuntu-latest
    needs: [test, build-streamlit, security]
    if: always()
    
    steps:
    - name: 📊 Verificar estados de jobs
      run: |
        echo "Lint: ${{ needs.lint.result }}"
        echo "Test: ${{ needs.test.result }}"
        echo "Security: ${{ needs.security.result }}"
        echo "Build: ${{ needs.build-streamlit.result }}"
    
    - name: ✅ Pipeline Exitoso
      if: needs.test.result == 'success' && needs.build-streamlit.result == 'success'
      run: |
        echo "✅ ¡Pipeline completado exitosamente!"
        echo "📊 Todos los tests pasaron"
        echo "🔒 Security scan completado"
        echo "🎨 Build de Streamlit OK"
    
    - name: ❌ Pipeline Fallido
      if: needs.test.result == 'failure' || needs.build-streamlit.result == 'failure'
      run: |
        echo "❌ Pipeline falló"
        echo "🔍 Revisa los logs para más detalles"
        exit 1
    
