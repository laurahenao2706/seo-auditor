# ============================================
# GitLab CI/CD Pipeline
# Alternativa a GitHub Actions
# ============================================

# Definir etapas del pipeline
stages:
  - lint          # Linting y formateo
  - test          # Pruebas unitarias
  - security      # Análisis de seguridad
  - build         # Build de aplicación
  - deploy        # Deployment
  - notify        # Notificaciones

# Variables globales
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.11"

# Cache para acelerar builds
cache:
  paths:
    - .cache/pip
    - venv/

# ============================================
# STAGE 1: Linting y Code Quality
# ============================================
lint:black:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install black
  script:
    - black --check --diff .
  allow_failure: true

lint:flake8:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install flake8
  script:
    - flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    - flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

lint:isort:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install isort
  script:
    - isort --check-only --diff .
  allow_failure: true

lint:mypy:
  stage: lint
  image: python:3.11-slim
  before_script:
    - pip install mypy
  script:
    - mypy seo_auditor/ --ignore-missing-imports
  allow_failure: true

# ============================================
# STAGE 2: Tests en Múltiples Versiones
# ============================================
.test_template: &test_template
  stage: test
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install coverage pytest pytest-cov
  script:
    - python -m coverage run -m unittest discover -s tests -p "test_*.py" -v
    - python -m coverage report -m
    - python -m coverage xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week

test:python3.10:
  <<: *test_template
  image: python:3.10-slim

test:python3.11:
  <<: *test_template
  image: python:3.11-slim

test:python3.12:
  <<: *test_template
  image: python:3.12-slim

# ============================================
# STAGE 3: Security Scan
# ============================================
security:dependencies:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install safety
    - pip install -r requirements.txt
  script:
    - safety check --json || true
  allow_failure: true

security:bandit:
  stage: security
  image: python:3.11-slim
  before_script:
    - pip install bandit
  script:
    - bandit -r seo_auditor/ -f json -o bandit-report.json || true
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week
  allow_failure: true

# ============================================
# STAGE 4: Build y Validación
# ============================================
build:app:
  stage: build
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
  script:
    - python -m py_compile app.py seo_checker.py
    - python -c "from seo_auditor import SeoAuditService; print('✓ Imports OK')"
    - pip list --format=freeze > installed-packages.txt
  artifacts:
    paths:
      - installed-packages.txt
    expire_in: 1 week

# ============================================
# STAGE 5: Deploy (Solo en main)
# ============================================
deploy:streamlit:
  stage: deploy
  image: python:3.11-slim
  only:
    - main
  script:
    - echo "🚀 Deployment trigger para Streamlit Cloud"
    - echo "✅ Push a main detectado - Streamlit Cloud sincronizará automáticamente"
  environment:
    name: production
    url: https://share.streamlit.io/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/main/app.py

deploy:staging:
  stage: deploy
  image: python:3.11-slim
  only:
    - develop
  script:
    - echo "🧪 Deployment trigger para Staging"
  environment:
    name: staging
  when: manual

# ============================================
# STAGE 6: Release (Solo en tags)
# ============================================
release:package:
  stage: deploy
  image: python:3.11-slim
  only:
    - tags
  script:
    - echo "📦 Creando release para $CI_COMMIT_TAG"
    - pip install build twine
    # Si quisieras publicar a PyPI:
    # - python -m build
    # - twine upload dist/*
  artifacts:
    paths:
      - dist/
    expire_in: 1 month

# ============================================
# STAGE 7: Notificaciones
# ============================================
notify:success:
  stage: notify
  image: alpine:latest
  only:
    - main
    - develop
  script:
    - echo "✅ Pipeline completado exitosamente"
    - echo "📊 Commit: $CI_COMMIT_SHORT_SHA"
    - echo "👤 Author: $CI_COMMIT_AUTHOR"
    - echo "🌿 Branch: $CI_COMMIT_BRANCH"
  when: on_success

notify:failure:
  stage: notify
  image: alpine:latest
  script:
    - echo "❌ Pipeline falló"
    - echo "📊 Commit: $CI_COMMIT_SHORT_SHA"
    - echo "🔍 Revisa los logs en: $CI_PIPELINE_URL"
  when: on_failure

# ============================================
# Jobs Manuales (Opcional)
# ============================================
manual:full-test:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov pytest-xdist
  script:
    - pytest tests/ -v --cov=seo_auditor --cov-report=html --cov-report=term
  artifacts:
    paths:
      - htmlcov/
    expire_in: 1 week
  when: manual
  allow_failure: false

