# ============================================
# Black Configuration  
# ============================================
[tool.black]
line-length = 100
target-version = ['py310', 'py311']

# ============================================
# Flake8 Configuration
# (Configurar en setup.cfg o .flake8 si se necesita)
# ============================================
max-line-length = 100
extend-ignore = E203, W503
exclude = .git,__pycache__,.venv,venv,build,dist
